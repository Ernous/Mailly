version: '3.8'
services:
  mailly:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SERVER_ADDR=0.0.0.0:3000
      - SERVER_URL=http://localhost:3000
      - DB_PATH=/app/data
      # Add your OAuth credentials here:
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - MICROSOFT_CLIENT_ID=
      - MICROSOFT_CLIENT_SECRET=
    volumes:
      - mailly_data:/app/data

volumes:
  mailly_data:
